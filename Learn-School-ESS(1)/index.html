    <style>
      
body {
    font-family: 'Ubuntu', sans-serif;
    background-color: #f4f6f9;
}

/* Theme Colors */
.bg-primary-green { background-color: #0C6447; }
.text-primary-green { color: #0C6447; }
.border-primary-green { border-color: #0C6447; }
.bg-light-green { background-color: #2CE67E; }
.text-light-green { color: #2CE67E; }

/* Custom Animations */
@keyframes popIn {
    from { opacity: 0; transform: scale(0.95) translateY(-10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.animate-pop-in { 
    animation: popIn 0.2s ease-out forwards; 
}

.animate-fade-in { 
    animation: fadeIn 0.3s ease-out forwards; 
}

.animate-slide-up { 
    animation: slideUp 0.4s ease-out forwards; 
}

/* Scrollbar Styling */
::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}

::-webkit-scrollbar-track {
    background: transparent;
}

::-webkit-scrollbar-thumb {
    background: #cbd5e1;
    border-radius: 10px;
}

::-webkit-scrollbar-thumb:hover {
    background: #94a3b8;
}
</style>
